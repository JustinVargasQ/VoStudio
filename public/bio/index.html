<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VO Studio — Links</title>
  <meta name="description" content="Desarrollo web, apps y tours 360° en Costa Rica." />
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/logo.jpeg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      background: #06030D;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', system-ui, sans-serif;
      padding: 48px 20px 64px;
      position: relative;
      overflow-x: hidden;
    }

    /* ═══════════════════════════════════════════
       BACKGROUND
    ═══════════════════════════════════════════ */
    .bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }

    /* Ambient orbs */
    .orb { position: absolute; border-radius: 50%; filter: blur(72px); will-change: transform; }
    .orb-1 { width: 500px; height: 500px; top: -15%; left: 50%; margin-left: -250px; background: radial-gradient(circle, rgba(255,92,154,0.26) 0%, transparent 65%); animation: of1 20s ease-in-out infinite; }
    .orb-2 { width: 400px; height: 400px; bottom: -10%; left: -10%; background: radial-gradient(circle, rgba(183,156,255,0.20) 0%, transparent 65%); animation: of2 25s ease-in-out infinite; }
    .orb-3 { width: 320px; height: 320px; top: 35%; right: -10%; background: radial-gradient(circle, rgba(255,106,99,0.14) 0%, transparent 65%); animation: of3 30s ease-in-out infinite; }
    .orb-4 { width: 250px; height: 250px; top: 60%; left: 10%; background: radial-gradient(circle, rgba(183,156,255,0.12) 0%, transparent 65%); animation: of2 22s ease-in-out infinite reverse; }
    .orb-5 { width: 180px; height: 180px; top: 20%; right: 15%; background: radial-gradient(circle, rgba(255,92,154,0.10) 0%, transparent 65%); animation: of1 17s ease-in-out infinite reverse; }

    @keyframes of1 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(20px,-30px)} 66%{transform:translate(-20px,20px)} }
    @keyframes of2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(35px,-45px)} }
    @keyframes of3 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,40px)} }

    /* Aurora wave */
    .aurora {
      position: absolute; bottom: 0; left: 0; right: 0; height: 50%;
      background: linear-gradient(0deg, rgba(183,156,255,0.06) 0%, transparent 100%);
      animation: aurora-pulse 8s ease-in-out infinite;
    }
    @keyframes aurora-pulse { 0%,100%{opacity:0.5;transform:scaleY(1)} 50%{opacity:1;transform:scaleY(1.2)} }

    /* Dot grid */
    .dot-grid {
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(255,92,154,0.20) 1px, transparent 1px);
      background-size: 30px 30px; opacity: 0.3;
      mask-image: radial-gradient(ellipse 85% 85% at 50% 50%, black 10%, transparent 100%);
      animation: grid-breathe 6s ease-in-out infinite;
    }
    @keyframes grid-breathe { 0%,100%{opacity:0.25} 50%{opacity:0.40} }

    /* Twinkling stars */
    .star {
      position: absolute; border-radius: 50%; background: white;
      animation: twinkle ease-in-out infinite;
    }
    @keyframes twinkle { 0%,100%{opacity:0;transform:scale(0.5)} 50%{opacity:1;transform:scale(1)} }

    /* Rising particles */
    .particle {
      position: absolute; border-radius: 50%; will-change: transform,opacity;
      animation: rise linear infinite;
    }
    @keyframes rise { 0%{transform:translateY(0) scale(1);opacity:0} 10%{opacity:1} 90%{opacity:0.5} 100%{transform:translateY(-105vh) scale(0.3);opacity:0} }

    /* Streaks (horizontal + diagonal) */
    .streak {
      position: absolute; border-radius: 999px; will-change: transform,opacity;
      animation: streak-h linear infinite;
    }
    .streak.diag {
      animation: streak-d linear infinite;
    }
    @keyframes streak-h {
      0%  {transform:translateX(-150px) scaleX(0);opacity:0}
      15% {opacity:1;transform:translateX(0) scaleX(1)}
      85% {opacity:0.3;transform:translateX(70vw) scaleX(1)}
      100%{opacity:0;transform:translateX(120vw) scaleX(0.2)}
    }
    @keyframes streak-d {
      0%  {transform:translate(-100px,60px) rotate(-25deg) scaleX(0);opacity:0}
      15% {opacity:0.8;transform:translate(0,0) rotate(-25deg) scaleX(1)}
      85% {opacity:0.2;transform:translate(60vw,-40px) rotate(-25deg) scaleX(1)}
      100%{opacity:0;transform:translate(110vw,-80px) rotate(-25deg) scaleX(0.2)}
    }

    /* Hex grid flash */
    .hex {
      position: absolute; opacity: 0;
      animation: hex-flash ease-in-out infinite;
    }
    @keyframes hex-flash { 0%,100%{opacity:0;transform:scale(0.8)} 50%{opacity:0.15;transform:scale(1)} }

    /* ═══════════════════════════════════════════
       ORBITAL SYSTEM
    ═══════════════════════════════════════════ */
    .orbital-system {
      position: relative;
      width: 88px; height: 88px;
      margin-bottom: 20px;
    }

    /* Spinning gradient ring on logo */
    .logo-wrap { position: absolute; inset: 0; z-index: 2; }
    .logo-ring {
      position: absolute; inset: -5px; border-radius: 50%;
      background: conic-gradient(from 0deg, #FF5C9A, #B79CFF, #FF6A63, #FF5C9A);
      animation: ring-spin 3s linear infinite; z-index: 1;
    }
    .logo-ring::after { content:''; position:absolute; inset:3px; border-radius:50%; background:#06030D; }
    @keyframes ring-spin { to{transform:rotate(360deg)} }

    /* Pulse rings expanding out */
    .pulse-ring {
      position: absolute; border-radius: 50%; border: 1px solid rgba(255,92,154,0.5);
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      animation: pulse-expand ease-out infinite;
    }
    .pulse-ring:nth-child(1) { animation-duration: 2.5s; animation-delay: 0s; }
    .pulse-ring:nth-child(2) { animation-duration: 2.5s; animation-delay: 0.85s; }
    .pulse-ring:nth-child(3) { animation-duration: 2.5s; animation-delay: 1.7s; }
    @keyframes pulse-expand {
      0%   { width:88px;height:88px;opacity:0.8;border-color:rgba(255,92,154,0.5) }
      100% { width:280px;height:280px;opacity:0;border-color:rgba(255,92,154,0) }
    }

    /* Orbit rings */
    .orbit {
      position: absolute; top:50%; left:50%;
      border-radius: 50%; border: 1px solid transparent;
      transform-origin: center;
    }
    .orbit-1 { width:140px;height:140px;margin:-70px 0 0 -70px;  border-color:rgba(255,92,154,0.22);  animation:cw  8s linear infinite; }
    .orbit-2 { width:200px;height:200px;margin:-100px 0 0 -100px;border-color:rgba(183,156,255,0.18); animation:ccw 13s linear infinite; }
    .orbit-3 { width:270px;height:270px;margin:-135px 0 0 -135px;border-color:rgba(255,92,154,0.10); animation:cw  20s linear infinite; }
    .orbit-4 { width:350px;height:350px;margin:-175px 0 0 -175px;border-color:rgba(183,156,255,0.07);animation:ccw 32s linear infinite; }

    @keyframes cw  { to{transform:rotate(360deg)} }
    @keyframes ccw { to{transform:rotate(-360deg)} }

    /* Dots on orbits */
    .od { position:absolute; border-radius:50%; top:50%; left:50%; }

    .orbit-1 .od-a { width:8px;height:8px; margin:-4px 0 0 -70px;  background:#FF5C9A; box-shadow:0 0 12px #FF5C9A,0 0 24px rgba(255,92,154,0.5); }
    .orbit-1 .od-b { width:5px;height:5px; margin:-2.5px 70px 0 0; background:#B79CFF; box-shadow:0 0 8px #B79CFF; }

    .orbit-2 .od-a { width:6px;height:6px; margin:-3px 0 0 -100px; background:#B79CFF; box-shadow:0 0 10px #B79CFF,0 0 20px rgba(183,156,255,0.5); }
    .orbit-2 .od-b { width:4px;height:4px; margin:-2px -100px 0 0; background:#FF5C9A; box-shadow:0 0 8px #FF5C9A; }
    .orbit-2 .od-c { width:3px;height:3px; margin:-1.5px 0 0 100px; background:#FF6A63; box-shadow:0 0 6px #FF6A63; }

    .orbit-3 .od-a { width:5px;height:5px; margin:-2.5px 0 0 -135px;background:rgba(255,106,99,0.9); box-shadow:0 0 8px #FF6A63; }
    .orbit-3 .od-b { width:4px;height:4px; margin:-2px 135px 0 0;  background:#FF5C9A; box-shadow:0 0 6px #FF5C9A; }
    .orbit-3 .od-c { width:3px;height:3px; margin:-1.5px -135px 0 0;background:#B79CFF; box-shadow:0 0 5px #B79CFF; }

    .orbit-4 .od-a { width:4px;height:4px; margin:-2px 0 0 -175px; background:rgba(183,156,255,0.7); box-shadow:0 0 6px #B79CFF; }
    .orbit-4 .od-b { width:3px;height:3px; margin:-1.5px 175px 0 0;background:rgba(255,92,154,0.7);  box-shadow:0 0 5px #FF5C9A; }

    .logo-wrap img { width:88px;height:88px;border-radius:50%;object-fit:cover;display:block;position:relative;z-index:3; }

    /* ═══════════════════════════════════════════
       CARD
    ═══════════════════════════════════════════ */
    .card {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      display: flex; flex-direction: column; align-items: center;
    }

    .name {
      font-family: 'Instrument Serif', serif; font-style: italic;
      font-size: 32px; color: #fff;
      letter-spacing: -0.02em; line-height: 1;
      margin-bottom: 8px; text-align: center;
      animation: fade-up 0.7s ease both;
    }
    .name span { background:linear-gradient(135deg,#FF5C9A,#B79CFF); -webkit-background-clip:text; background-clip:text; color:transparent; }

    .tagline {
      font-size: 13px; color: rgba(255,255,255,0.50);
      text-align: center; line-height: 1.5;
      margin-bottom: 8px; max-width: 270px;
      animation: fade-up 0.7s 0.08s ease both;
    }

    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px; border-radius: 999px;
      background: rgba(255,92,154,0.10); border: 1px solid rgba(255,92,154,0.30);
      font-size: 11px; color: #FF8AB8; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 36px;
      animation: fade-up 0.7s 0.14s ease both;
    }

    /* Links */
    .links { width:100%; display:flex; flex-direction:column; gap:10px; }

    .link-btn {
      display: flex; align-items: center; gap: 14px;
      width: 100%; padding: 15px 20px; border-radius: 14px;
      text-decoration: none; font-size: 14px; font-weight: 600; color: #fff;
      border: 1px solid rgba(255,255,255,0.09);
      background: rgba(255,255,255,0.045);
      backdrop-filter: blur(10px);
      transition: transform 0.18s, background 0.18s, border-color 0.18s, box-shadow 0.18s;
      position: relative; overflow: hidden;
      animation: fade-up 0.6s ease both;
    }
    .link-btn::before {
      content:''; position:absolute; inset:0;
      background:linear-gradient(135deg,rgba(255,92,154,0.07),rgba(183,156,255,0.07));
      opacity:0; transition:opacity 0.2s;
    }
    .link-btn:hover::before { opacity:1; }
    .link-btn:hover { transform:translateY(-2px) scale(1.01); border-color:rgba(255,92,154,0.40); box-shadow:0 8px 28px rgba(255,92,154,0.18),0 0 0 1px rgba(255,92,154,0.10); }
    .link-btn:active { transform:scale(0.98); }

    .link-btn.primary {
      background:linear-gradient(135deg,#FF5C9A 0%,#B79CFF 100%);
      border-color:transparent; box-shadow:0 8px 24px rgba(255,92,154,0.40);
    }
    .link-btn.primary:hover { box-shadow:0 12px 36px rgba(255,92,154,0.60); border-color:transparent; }

    .link-btn:nth-child(1){animation-delay:0.20s}
    .link-btn:nth-child(3){animation-delay:0.27s}
    .link-btn:nth-child(4){animation-delay:0.33s}
    .link-btn:nth-child(5){animation-delay:0.39s}
    .link-btn:nth-child(6){animation-delay:0.45s}

    .link-icon { width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(255,255,255,0.12); }
    .link-btn.primary .link-icon { background:rgba(255,255,255,0.22); }

    .link-text { flex:1; }
    .link-label { display:block;font-size:14px;font-weight:700; }
    .link-sub   { display:block;font-size:11px;color:rgba(255,255,255,0.52);margin-top:1px; }
    .link-btn.primary .link-sub { color:rgba(255,255,255,0.78); }

    .link-arrow { color:rgba(255,255,255,0.32);flex-shrink:0; }
    .link-btn.primary .link-arrow { color:rgba(255,255,255,0.65); }

    .divider { width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.07),transparent);margin:4px 0; }

    @keyframes fade-up { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    /* Mobile */
    @media (max-width:430px) {
      body { padding:28px 16px 48px; }
      .name { font-size:28px; }
      .orbit-4 { display:none; }
    }
  </style>
</head>
<body>

    <!-- Rising particles -->
    <div class="particle" style="width:3px;height:3px;background:#FF5C9A;left:8%;bottom:-5%;animation-duration:12s;animation-delay:0s;box-shadow:0 0 8px #FF5C9A;"></div>

    <div class="particle" style="width:4px;height:4px;background:#FF5C9A;left:28%;bottom:-5%;animation-duration:11s;animation-delay:1s;box-shadow:0 0 10px #FF5C9A;"></div>
    <div class="particle" style="width:2px;height:2px;background:#FF6A63;left:38%;bottom:-5%;animation-duration:19s;animation-delay:4s;box-shadow:0 0 5px #FF6A63;"></div>
    <div class="particle" style="width:3px;height:3px;background:#B79CFF;left:48%;bottom:-5%;animation-duration:14s;animation-delay:0.5s;box-shadow:0 0 8px #B79CFF;"></div>
    <div class="particle" style="width:2px;height:2px;background:#FF5C9A;left:58%;bottom:-5%;animation-duration:16s;animation-delay:3s;box-shadow:0 0 5px #FF5C9A;"></div>
    <div class="particle" style="width:4px;height:4px;background:#B79CFF;left:68%;bottom:-5%;animation-duration:10s;animation-delay:6s;box-shadow:0 0 10px #B79CFF;"></div>

    <div class="particle" style="width:2px;height:2px;background:#B79CFF;left:95%;bottom:-5%;animation-duration:18s;animation-delay:1.5s;box-shadow:0 0 5px #B79CFF;"></div>
    <div class="particle" style="width:3px;height:3px;background:#FF5C9A;left:3%;bottom:-5%;animation-duration:15s;animation-delay:8s;box-shadow:0 0 8px #FF5C9A;"></div>
    <div class="particle" style="width:2px;height:2px;background:#FF6A63;left:53%;bottom:-5%;animation-duration:23s;animation-delay:3.5s;box-shadow:0 0 5px #FF6A63;"></div>

  <!-- ── CARD ── -->
  <div class="card">

    <!-- Logo + orbital system -->

      <!-- Expanding pulse rings -->
