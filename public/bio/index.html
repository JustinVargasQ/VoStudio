<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VO Studio — Links</title>
  <meta name="description" content="Desarrollo web, apps y tours 360° en Costa Rica." />
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/logo.jpeg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      background: #06030D;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', system-ui, sans-serif;
      padding: 40px 20px 60px;
      position: relative;
      overflow-x: hidden;
    }

    /* ── BACKGROUND CANVAS ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    /* Large ambient orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(70px);
      will-change: transform;
    }
    .orb-1 {
      width: 420px; height: 420px;
      top: -10%; left: 50%; transform: translateX(-50%);
      background: radial-gradient(circle, rgba(255,92,154,0.22) 0%, transparent 65%);
      animation: orb-float-1 18s ease-in-out infinite;
    }
    .orb-2 {
      width: 350px; height: 350px;
      bottom: -5%; left: -8%;
      background: radial-gradient(circle, rgba(183,156,255,0.18) 0%, transparent 65%);
      animation: orb-float-2 22s ease-in-out infinite;
    }
    .orb-3 {
      width: 280px; height: 280px;
      top: 40%; right: -8%;
      background: radial-gradient(circle, rgba(255,106,99,0.12) 0%, transparent 65%);
      animation: orb-float-3 26s ease-in-out infinite;
    }
    .orb-4 {
      width: 200px; height: 200px;
      top: 55%; left: 15%;
      background: radial-gradient(circle, rgba(183,156,255,0.10) 0%, transparent 65%);
      animation: orb-float-2 20s ease-in-out infinite reverse;
    }

    @keyframes orb-float-1 {
      0%,100% { transform: translateX(-50%) translateY(0px); }
      33%      { transform: translateX(-48%) translateY(-28px); }
      66%      { transform: translateX(-52%) translateY(18px); }
    }
    @keyframes orb-float-2 {
      0%,100% { transform: translate(0, 0); }
      50%     { transform: translate(30px, -40px); }
    }
    @keyframes orb-float-3 {
      0%,100% { transform: translate(0, 0); }
      50%     { transform: translate(-25px, 35px); }
    }

    /* Dot grid */
    .dot-grid {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,92,154,0.18) 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.35;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 100%);
    }

    /* Floating micro-particles */
    .particle {
      position: absolute;
      border-radius: 50%;
      will-change: transform, opacity;
      animation: particle-rise linear infinite;
    }
    @keyframes particle-rise {
      0%   { transform: translateY(0) scale(1); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-100vh) scale(0.4); opacity: 0; }
    }

    /* Horizontal streak */
    .streak {
      position: absolute;
      height: 1px;
      border-radius: 999px;
      will-change: transform, opacity;
      animation: streak-move linear infinite;
    }
    @keyframes streak-move {
      0%   { transform: translateX(-100%) scaleX(0); opacity: 0; }
      20%  { transform: translateX(0) scaleX(1); opacity: 1; }
      80%  { transform: translateX(60vw) scaleX(1); opacity: 0.4; }
      100% { transform: translateX(120vw) scaleX(0.3); opacity: 0; }
    }

    /* ── ORBITAL RINGS (around logo) ── */
    .orbital-system {
      position: relative;
      width: 88px;
      height: 88px;
      margin-bottom: 20px;
    }

    .logo-wrap {
      position: absolute;
      inset: 0;
      z-index: 2;
    }
    .logo-ring {
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #FF5C9A, #B79CFF, #FF6A63, #FF5C9A);
      animation: ring-spin 4s linear infinite;
      z-index: 1;
    }
    .logo-ring::after {
      content: '';
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: #06030D;
    }
    @keyframes ring-spin {
      to { transform: rotate(360deg); }
    }

    .logo-wrap img {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      position: relative;
      z-index: 3;
    }

    /* Orbit rings */
    .orbit {
      position: absolute;
      top: 50%; left: 50%;
      border-radius: 50%;
      border: 1px solid transparent;
      transform-origin: center;
    }

    .orbit-1 {
      width: 140px; height: 140px;
      margin: -70px 0 0 -70px;
      border-color: rgba(255,92,154,0.20);
      animation: orbit-cw 8s linear infinite;
    }
    .orbit-2 {
      width: 200px; height: 200px;
      margin: -100px 0 0 -100px;
      border-color: rgba(183,156,255,0.15);
      animation: orbit-ccw 13s linear infinite;
    }
    .orbit-3 {
      width: 270px; height: 270px;
      margin: -135px 0 0 -135px;
      border-color: rgba(255,92,154,0.08);
      animation: orbit-cw 22s linear infinite;
    }

    @keyframes orbit-cw  { to { transform: rotate(360deg); } }
    @keyframes orbit-ccw { to { transform: rotate(-360deg); } }

    /* Dots on orbits */
    .orbit-dot {
      position: absolute;
      border-radius: 50%;
      top: 50%; left: 50%;
    }
    .orbit-1 .orbit-dot {
      width: 7px; height: 7px;
      margin: -3.5px 0 0 -70px; /* radius = 70 */
      background: #FF5C9A;
      box-shadow: 0 0 10px #FF5C9A, 0 0 20px rgba(255,92,154,0.5);
    }
    .orbit-2 .orbit-dot {
      width: 5px; height: 5px;
      margin: -2.5px 0 0 -100px; /* radius = 100 */
      background: #B79CFF;
      box-shadow: 0 0 8px #B79CFF, 0 0 16px rgba(183,156,255,0.5);
    }
    .orbit-2 .orbit-dot-2 {
      width: 4px; height: 4px;
      margin: -2px -100px 0 0; /* opposite side */
      background: #FF5C9A;
      box-shadow: 0 0 6px #FF5C9A;
    }
    .orbit-3 .orbit-dot {
      width: 4px; height: 4px;
      margin: -2px 0 0 -135px; /* radius = 135 */
      background: rgba(255,106,99,0.8);
      box-shadow: 0 0 6px #FF6A63;
    }

    /* ── CARD ── */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .name {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: 32px;
      color: #fff;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 8px;
      text-align: center;
      animation: fade-up 0.8s ease both;
    }
    .name span {
      background: linear-gradient(135deg, #FF5C9A, #B79CFF);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .tagline {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      text-align: center;
      line-height: 1.5;
      margin-bottom: 8px;
      max-width: 280px;
      animation: fade-up 0.8s 0.1s ease both;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      border-radius: 999px;
      background: rgba(255,92,154,0.10);
      border: 1px solid rgba(255,92,154,0.30);
      font-size: 11px;
      color: #FF8AB8;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 36px;
      animation: fade-up 0.8s 0.15s ease both;
    }

    /* Links */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 15px 20px;
      border-radius: 14px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(8px);
      transition: transform 0.18s, background 0.18s, border-color 0.18s, box-shadow 0.18s;
      position: relative;
      overflow: hidden;
    }
    .link-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,92,154,0.06), rgba(183,156,255,0.06));
      opacity: 0;
      transition: opacity 0.2s;
    }
    .link-btn:hover::before { opacity: 1; }
    .link-btn:hover {
      transform: translateY(-2px) scale(1.01);
      border-color: rgba(255,92,154,0.40);
      box-shadow: 0 8px 28px rgba(255,92,154,0.18), 0 0 0 1px rgba(255,92,154,0.12);
    }
    .link-btn:active { transform: scale(0.98); }

    .link-btn.primary {
      background: linear-gradient(135deg, #FF5C9A 0%, #B79CFF 100%);
      border-color: transparent;
      box-shadow: 0 8px 24px rgba(255,92,154,0.40);
    }
    .link-btn.primary::before {
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    }
    .link-btn.primary:hover {
      box-shadow: 0 12px 36px rgba(255,92,154,0.55);
      border-color: transparent;
    }

    .link-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: rgba(255,255,255,0.12);
    }
    .link-btn.primary .link-icon { background: rgba(255,255,255,0.22); }

    .link-text { flex: 1; }
    .link-label { display: block; font-size: 14px; font-weight: 700; }
    .link-sub   { display: block; font-size: 11px; color: rgba(255,255,255,0.55); margin-top: 1px; }
    .link-btn.primary .link-sub { color: rgba(255,255,255,0.75); }

    .link-arrow { color: rgba(255,255,255,0.35); flex-shrink: 0; }
    .link-btn.primary .link-arrow { color: rgba(255,255,255,0.65); }

    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
      margin: 4px 0;
    }

    /* Entrance animations */
    .link-btn { animation: fade-up 0.6s ease both; }
    .link-btn:nth-child(1) { animation-delay: 0.2s; }
    .link-btn:nth-child(3) { animation-delay: 0.28s; }
    .link-btn:nth-child(4) { animation-delay: 0.34s; }
    .link-btn:nth-child(5) { animation-delay: 0.40s; }
    .link-btn:nth-child(6) { animation-delay: 0.46s; }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .footer {
      margin-top: 36px;
      font-size: 11px;
      color: rgba(255,255,255,0.20);
      text-align: center;
      letter-spacing: 0.04em;
      animation: fade-up 0.8s 0.6s ease both;
    }
    .footer a { color: rgba(255,92,154,0.50); text-decoration: none; }

    /* Mobile tweaks */
    @media (max-width: 430px) {
      body { padding: 30px 16px 50px; }
      .name { font-size: 28px; }
      .orbit-3 { display: none; }
    }
  </style>
</head>
