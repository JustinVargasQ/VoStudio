<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VO Studio — Links</title>
  <meta name="description" content="Desarrollo web, apps y tours 360° en Costa Rica." />
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/logo.jpeg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      background: #06030D;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', system-ui, sans-serif;
      padding: 40px 20px 60px;
      position: relative;
      overflow-x: hidden;
    }

    /* Ambient glows */
    body::before {
      content: '';
      position: fixed;
      top: -10%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(255,92,154,0.18) 0%, transparent 65%);
      filter: blur(60px);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -10%;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(183,156,255,0.14) 0%, transparent 65%);
      filter: blur(60px);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Logo */
    .logo-wrap {
      position: relative;
      margin-bottom: 20px;
    }
    .logo-wrap::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      background: linear-gradient(135deg, #FF5C9A, #B79CFF);
      z-index: -1;
      opacity: 0.8;
    }
    .logo-wrap img {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      border: 3px solid #06030D;
    }

    /* Name */
    .name {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: 32px;
      color: #ffffff;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 8px;
      text-align: center;
    }
    .name span {
      background: linear-gradient(135deg, #FF5C9A, #B79CFF);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* Tagline */
    .tagline {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      text-align: center;
      line-height: 1.5;
      margin-bottom: 8px;
      max-width: 280px;
    }

    /* Location badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      border-radius: 999px;
      background: rgba(255,92,154,0.10);
      border: 1px solid rgba(255,92,154,0.30);
      font-size: 11px;
      color: #FF8AB8;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    /* Links */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 15px 20px;
      border-radius: 14px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      transition: transform 0.18s, background 0.18s, border-color 0.18s, box-shadow 0.18s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .link-btn:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,92,154,0.45);
      box-shadow: 0 8px 28px rgba(255,92,154,0.20);
    }
    .link-btn:active {
      transform: translateY(0);
    }

    .link-btn.primary {
      background: linear-gradient(135deg, #FF5C9A 0%, #B79CFF 100%);
      border-color: transparent;
      box-shadow: 0 8px 24px rgba(255,92,154,0.40);
    }
    .link-btn.primary:hover {
      box-shadow: 0 12px 32px rgba(255,92,154,0.55);
      background: linear-gradient(135deg, #FF7AAE 0%, #C9B4FF 100%);
    }

    .link-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: rgba(255,255,255,0.12);
    }
    .link-btn.primary .link-icon {
      background: rgba(255,255,255,0.22);
    }

    .link-icon svg { display: block; }

    .link-text { flex: 1; }
    .link-label { display: block; font-size: 14px; font-weight: 700; }
    .link-sub { display: block; font-size: 11px; color: rgba(255,255,255,0.60); margin-top: 1px; font-weight: 400; }
    .link-btn.primary .link-sub { color: rgba(255,255,255,0.75); }

    .link-arrow {
      color: rgba(255,255,255,0.40);
      flex-shrink: 0;
    }
    .link-btn.primary .link-arrow { color: rgba(255,255,255,0.70); }

    /* Divider */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      margin: 6px 0;
    }

    /* Footer */
    .footer {
      margin-top: 36px;
      font-size: 11px;
      color: rgba(255,255,255,0.22);
      text-align: center;
      letter-spacing: 0.04em;
    }
    .footer a {
      color: rgba(255,92,154,0.55);
      text-decoration: none;
    }
  </style>
</head>
