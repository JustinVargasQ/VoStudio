    <!-- FAQPage schema — Google shows these answers directly in search results -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "¿Cuánto cuesta desarrollar un sitio web o app en Costa Rica?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Los precios arrancan desde ₡450.000 para una landing, ₡950.000 para un sitio completo, ₡2.200.000 para e-commerce y ₡4.500.000 para apps móviles o sistemas a medida. Antes de firmar damos una propuesta detallada línea por línea, sin sorpresas ni letra chica."
          }
        },
        {
          "@type": "Question",
          "name": "¿Quién paga el hosting y el dominio?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Configuramos hosting en Vercel, Netlify o un VPS según lo que pida tu proyecto — cuesta entre $5 y $25 al mes, mucho menos que GoDaddy o Wix. Dominio del primer año y todo el setup van incluidos en la mayoría de los planes."
          }
        },
        {
          "@type": "Question",
          "name": "¿Puedo editar textos e imágenes yo mismo después de entregar?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí. Todos los sitios de contenido vienen con un panel admin donde editás todo sin tocar código. Incluimos un video corto de capacitación y soporte por WhatsApp si te trabás."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cómo manejan los pagos del desarrollo?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "50% al arrancar para reservar el cupo en agenda, 50% contra entrega. Aceptamos SINPE Móvil, transferencia bancaria y tarjeta. Para proyectos grandes (apps, sistemas) lo partimos en 3 hitos: kickoff, prototipo aprobado y entrega final."
          }
        },
        {
          "@type": "Question",
          "name": "¿En cuánto tiempo va a estar listo mi proyecto?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Landings: 1-2 semanas. Sitios completos: 2-4 semanas. E-commerce: 4-7 semanas. Apps y sistemas a medida: desde 6 semanas. Los plazos los firmamos al kickoff y los respetamos."
          }
        },
        {
          "@type": "Question",
          "name": "¿Y si necesito cambios después de entregar el sitio?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Todo plan incluye 30 a 90 días de soporte post-lanzamiento gratis. Después, los planes de mantenimiento arrancan en ₡100.000/mes e incluyen cambios chicos, actualizaciones de seguridad, monitoreo 24/7 y soporte por WhatsApp."
          }
        },
        {
          "@type": "Question",
          "name": "¿Trabajan con clientes fuera de Costa Rica?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Más de la mitad de nuestros proyectos son 100% remotos — clientes de México, EE.UU., España y Argentina. Coordinamos por Zoom, Slack o WhatsApp. Aceptamos pagos por PayPal, Wise o transferencia internacional sin recargos ocultos."
          }
        },
        {
          "@type": "Question",
          "name": "¿De quién es el código fuente al final del proyecto?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Tuyo, 100%. Al entregar te pasamos el código fuente, todas las credenciales, la base de datos y el dominio registrado a tu nombre. No tenemos contratos de permanencia ni claves ocultas."
          }
        },
        {
          "@type": "Question",
          "name": "¿Integran IA, chatbots o servicios de Google Cloud?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí. Integramos Gemini, OpenAI, Claude, Cloud Vision, Maps API, Firebase, Dialogflow y más, según las necesidades y presupuesto del cliente. También usamos alternativas open source (TensorFlow.js, Leaflet, Pannellum) cuando son más adecuadas."
          }
        }
      ]
    }
    </script>
